# ============================================================================
# GitHub Actions: 构建 pytexgen Windows wheel + 源码包
# PyPI 只发布 Windows wheel 和 sdist；Linux / macOS 用户从源码本地编译
# ============================================================================

name: Build distributions

on:
  # 推送到 main 分支时触发
  push:
    branches: [main, master]
    tags:
      - "v*"          # 带版本标签时也触发（用于发布）

  # Pull Request 时触发（仅构建，不上传）
  pull_request:
    branches: [main, master]

  # 手动触发
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. 构建 Windows wheel
  # ──────────────────────────────────────────────────────────────────────────
  build_windows_wheels:
    name: Build Windows wheels
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install SWIG (Windows)
        run: choco install swig -y

      # ── 验证 SWIG 已安装 ──
      - name: Verify SWIG
        run: swig -version

      # ── 使用 cibuildwheel 构建 ──
      - uses: pypa/cibuildwheel@v2.21
        env:
          # Windows: only publish AMD64 wheels. Linux/macOS users build from sdist.
          CIBW_ARCHS_WINDOWS: "AMD64"

          # ── 在每个 Python 环境构建前通过 pip 安装 swig ──
          # 这样 swig 会直接装到当前构建用的 Python 环境中，所有平台通用
          CIBW_BEFORE_BUILD: "pip install swig"

          # 开启详细日志，便于排查编译错误
          CIBW_BUILD_VERBOSITY: "3"

      # ── 上传构建产物 ──
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: ./wheelhouse/*.whl

  # ──────────────────────────────────────────────────────────────────────────
  # 2. 构建 sdist 源码包
  # ──────────────────────────────────────────────────────────────────────────
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ──────────────────────────────────────────────────────────────────────────
  # 3. 上传到 PyPI（仅在打 tag 时触发）
  # ──────────────────────────────────────────────────────────────────────────
  upload_pypi:
    name: Upload to PyPI
    needs: [build_windows_wheels, build_sdist]
    runs-on: ubuntu-22.04
    # 仅在推送版本标签时执行
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    # 使用 GitHub 的 Trusted Publisher（推荐方式）
    permissions:
      id-token: write

    # 如果你在 GitHub 配置了 pypi 环境保护规则，取消下面的注释：
    # environment:
    #   name: pypi
    #   url: https://pypi.org/p/pytexgen

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # 方式 A：使用 Trusted Publisher（无需 token，推荐）
      - uses: pypa/gh-action-pypi-publish@release/v1

      # 方式 B：使用 API token（如果不用 Trusted Publisher，替换上面的步骤）
      # - uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     password: ${{ secrets.PYPI_API_TOKEN }}
